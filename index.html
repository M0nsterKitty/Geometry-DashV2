<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Geometry Dash Lite</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      touch-action: manipulation;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, sans-serif;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      image-rendering: auto;
    }
    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .score-stack {
      margin-top: 14px;
      text-align: center;
      color: rgba(255,255,255,0.95);
      text-shadow: 0 2px 6px rgba(0,0,0,0.35);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity .2s ease, transform .2s ease;
      will-change: opacity, transform;
    }
    .score-stack.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .score-current {
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 700;
      line-height: 1;
    }
    .score-high {
      margin-top: 4px;
      font-size: clamp(11px, 1.8vw, 14px);
      font-weight: 600;
      letter-spacing: 1px;
      opacity: .9;
    }
    #menu {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.95);
      opacity: 0;
      transition: opacity .25s ease;
      will-change: opacity;
    }
    #menu.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #menu h1 {
      margin: 0;
      font-size: clamp(28px, 5.2vw, 44px);
      letter-spacing: .5px;
      text-align: center;
    }
    #menu p {
      margin: 12px 12px 0;
      text-align: center;
      font-size: clamp(14px, 2vw, 19px);
      opacity: .92;
    }
    .cards {
      margin-top: 26px;
      width: min(880px, 92vw);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    .card {
      border: 1.5px solid rgba(255,255,255,.33);
      background: rgba(255,255,255,.1);
      border-radius: 10px;
      min-height: 138px;
      color: rgba(255,255,255,.96);
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background-color .15s ease, box-shadow .15s ease;
      will-change: transform;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: auto;
    }
    .card:hover {
      transform: translateY(-3px) scale(1.03);
      background: rgba(255,255,255,.14);
      border-color: rgba(255,255,255,.7);
    }
    .card.selected {
      border-color: #7dd3fc;
      background: rgba(125,211,252,.15);
      box-shadow: 0 0 0 1px rgba(125,211,252,.4) inset;
      transform: translateY(-2px) scale(1.025);
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 4px;
    }
    .avatar.round { border-radius: 50%; }
    .card span {
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      line-height: 1.2;
      padding: 0 6px;
    }
    .hint {
      margin-top: 16px;
      font-size: clamp(12px, 1.7vw, 16px);
      opacity: .9;
      text-align: center;
    }
    @media (max-width: 760px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card { min-height: 118px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>
    <div id="hud">
      <div id="scoreStack" class="score-stack">
        <div id="scoreCurrent" class="score-current">0</div>
        <div id="scoreHigh" class="score-high">HIGH SCORE: 0</div>
      </div>
    </div>
    <div id="menu" class="visible" aria-live="polite">
      <h1>GEOMETRY DASH LITE</h1>
      <p>Select a character and start</p>
      <div id="cards" class="cards"></div>
      <div class="hint">Click / Tap / Space to jump • Reach 5000 to win</div>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
    const menuEl = document.getElementById('menu');
    const cardsEl = document.getElementById('cards');
    const scoreStackEl = document.getElementById('scoreStack');
    const scoreCurrentEl = document.getElementById('scoreCurrent');
    const scoreHighEl = document.getElementById('scoreHigh');

    const BASE_W = 960;
    const BASE_H = 540;
    let cssW = 0, cssH = 0, dpr = 1;
    let scale = 1, viewW = BASE_W, viewH = BASE_H;

    function resize() {
      cssW = window.innerWidth;
      cssH = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.max(1, Math.floor(cssW * dpr));
      canvas.height = Math.max(1, Math.floor(cssH * dpr));
      scale = Math.min(cssW / BASE_W, cssH / BASE_H);
      viewW = BASE_W;
      viewH = BASE_H;
    }
    window.addEventListener('resize', resize, { passive: true });
    resize();

    let audioCtx = null;
    let audioUnlocked = false;
    const music = { master: null, musicGain: null, sfxGain: null, started: false, enabled: false, nextNoteTime: 0, step: 0, fadeValue: 0, fadeTarget: 0, melody: [0, 3, 7, 10, 7, 3, 5, 3], baseHz: 220 };
    const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
    const lerp = (a, b, t) => a + (b - a) * t;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (!audioUnlocked && audioCtx.state === 'suspended') audioCtx.resume();
      if (!music.master) {
        music.master = audioCtx.createGain();
        music.musicGain = audioCtx.createGain();
        music.sfxGain = audioCtx.createGain();
        music.master.gain.value = 0;
        music.musicGain.gain.value = 0.22;
        music.sfxGain.gain.value = 0.2;
        music.musicGain.connect(music.master);
        music.sfxGain.connect(music.master);
        music.master.connect(audioCtx.destination);
      }
      audioUnlocked = true;
    }
    const setMusicTarget = (v) => music.fadeTarget = clamp(v, 0, 1);
    function startMusic() {
      if (!audioCtx || audioCtx.state !== 'running') return;
      if (!music.started) {
        music.started = true;
        music.step = 0;
        music.nextNoteTime = audioCtx.currentTime + 0.02;
      }
      music.enabled = true;
      setMusicTarget(1);
    }
    function stopMusic() { music.enabled = false; setMusicTarget(0); }

    function scheduleTone(freq, t, dur, gainAmt, type) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(gainAmt, t + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(gain);
      gain.connect(music.musicGain);
      osc.start(t);
      osc.stop(t + dur + 0.01);
    }
    function scheduleBeat(t, difficulty) {
      const note = music.melody[music.step % music.melody.length];
      const freq = music.baseHz * Math.pow(2, note / 12);
      scheduleTone(freq, t, 0.12, 0.045, 'triangle');
      if ((music.step & 1) === 0) scheduleTone(freq * 0.5, t, 0.09, 0.03, 'sine');
      const click = audioCtx.createOscillator();
      const clickGain = audioCtx.createGain();
      click.type = 'square';
      click.frequency.setValueAtTime(1500 + difficulty * 250, t);
      click.frequency.exponentialRampToValueAtTime(300, t + 0.03);
      clickGain.gain.setValueAtTime(0.0001, t);
      clickGain.gain.exponentialRampToValueAtTime(0.016, t + 0.002);
      clickGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.035);
      click.connect(clickGain);
      clickGain.connect(music.musicGain);
      click.start(t);
      click.stop(t + 0.04);
      music.step++;
    }
    function updateAudio(dt) {
      if (!audioCtx || !music.master) return;
      music.fadeValue += (music.fadeTarget - music.fadeValue) * Math.min(1, dt * 5.5);
      music.master.gain.value = music.fadeValue * music.fadeValue * 0.9;
      if (!music.started || !music.enabled || audioCtx.state !== 'running') return;
      const bpm = lerp(122, 148, world.difficulty);
      const beat = 60 / bpm;
      const lookahead = audioCtx.currentTime + 0.14;
      while (music.nextNoteTime < lookahead) {
        scheduleBeat(music.nextNoteTime, world.difficulty);
        music.nextNoteTime += beat * 0.5;
      }
    }
    function playJumpSound() {
      if (!audioCtx || audioCtx.state !== 'running') return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(960, now);
      osc.frequency.exponentialRampToValueAtTime(420, now + 0.06);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.08, now + 0.003);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.065);
      osc.connect(gain);
      gain.connect(music.sfxGain || audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.07);
    }

    const CHARACTERS = [
      { id: 0, name: 'Smiling square', color: '#60a5fa', shape: 'square' },
      { id: 1, name: 'Round blob', color: '#34d399', shape: 'round' },
      { id: 2, name: 'Mini robot', color: '#f59e0b', shape: 'square' },
      { id: 3, name: 'Tiny cat block', color: '#f472b6', shape: 'square' }
    ];

    const STATE_MENU = 0;
    const STATE_PLAY = 1;
    const STATE_WIN = 2;
    let state = STATE_MENU;
    let selectedChar = 0;

    const world = {
      groundY: 420, scroll: 0, baseSpeed: 270, speed: 270, speedScale: 1, difficulty: 0,
      score: 0, scoreRate: 16, spawnTimer: 0, spawnInterval: 1.45, stopSpawn: false, bgT: 0,
      winT: 0, winTextT: 0, spawnXCursor: 0, upperCooldown: 0
    };

    const PLAYER_SIZE = 40;
    const player = {
      x: 150, y: 0, w: PLAYER_SIZE, h: PLAYER_SIZE, vy: 0,
      gravity: 2200, jumpV: -760, onGround: false, bounceT: 0, rot: 0, rotVel: 0,
      squash: 0, stretch: 0, prevY: 0
    };

    const STORAGE_KEY = 'geometry_dash_lite_high_score_v2';
    let highScore = 0;
    try { highScore = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10) || 0; } catch (_) { highScore = 0; }

    function updateScoreUI(force = false) {
      scoreCurrentEl.textContent = (world.score | 0).toString();
      scoreHighEl.textContent = `HIGH SCORE: ${highScore | 0}`;
      if (force) scoreStackEl.classList.toggle('visible', state !== STATE_MENU);
    }

    function setMenuVisible(show) {
      menuEl.classList.toggle('visible', show);
      scoreStackEl.classList.toggle('visible', !show);
    }

    function resetPools() {
      obstacleCount = 0;
      particleCount = 0;
      for (let i = 0; i < OB_MAX; i++) obstacles[i].active = false;
      for (let i = 0; i < P_MAX; i++) particles[i].active = false;
    }

    function resetPlayer() {
      player.w = PLAYER_SIZE;
      player.h = PLAYER_SIZE;
      player.x = 150;
      player.y = world.groundY - player.h;
      player.prevY = player.y;
      player.vy = 0;
      player.onGround = true;
      player.bounceT = 0;
      player.rot = 0;
      player.rotVel = 0;
      player.squash = 0;
      player.stretch = 0;
    }

    function resetWorld() {
      world.scroll = 0;
      world.baseSpeed = 270;
      world.speed = 270;
      world.speedScale = 1;
      world.difficulty = 0;
      world.score = 0;
      world.scoreRate = 16;
      world.spawnTimer = 0;
      world.spawnInterval = 1.45;
      world.stopSpawn = false;
      world.bgT = 0;
      world.winT = 0;
      world.winTextT = 0;
      world.spawnXCursor = viewW + 100;
      world.upperCooldown = 0;
      resetPools();
      resetPlayer();
      updateScoreUI();
    }

    function startGame() {
      resetWorld();
      state = STATE_PLAY;
      setMenuVisible(false);
      startMusic();
    }

    function returnToMenu() {
      state = STATE_MENU;
      resetWorld();
      setMenuVisible(true);
      stopMusic();
    }

    function queueJumpInput(e) {
      if (e) e.preventDefault();
      ensureAudio();
      if (state === STATE_PLAY) {
        if (player.onGround) doJump();
        return;
      }
      if (state === STATE_MENU) {
        startGame();
      }
    }

    function doJump() {
      player.vy = player.jumpV;
      player.onGround = false;
      player.rotVel = (Math.PI * 2) / ((-2 * player.jumpV) / player.gravity);
      player.stretch = 1;
      playJumpSound();
    }

    window.addEventListener('pointerdown', queueJumpInput, { passive: false });
    window.addEventListener('keydown', (e) => {
      if (e.code !== 'Space') return;
      e.preventDefault();
      queueJumpInput(e);
    }, { passive: false });

    const OB_MAX = 64;
    const obstacles = new Array(OB_MAX);
    let obstacleCount = 0;
    const makeObstacle = () => ({ active: false, type: 0, x: 0, y: 0, w: 0, h: 0, phase: 0, amp: 0, speedY: 0, gap: 88 });
    for (let i = 0; i < OB_MAX; i++) obstacles[i] = makeObstacle();

    function allocObstacle() {
      for (let i = 0; i < OB_MAX; i++) {
        const o = obstacles[i];
        if (!o.active) {
          o.active = true;
          obstacleCount++;
          return o;
        }
      }
      return null;
    }
    function freeObstacle(o) { if (o.active) { o.active = false; obstacleCount--; } }

    function spawnObstacle() {
      const o = allocObstacle();
      if (!o) return;

      const roll = Math.random();
      const upperAllowed = world.upperCooldown <= 0;
      let t = 0;
      if (upperAllowed && roll > 0.88) t = 4;
      else if (upperAllowed && roll > 0.78) t = 3;
      else if (roll > 0.56) t = 1;
      else if (roll > 0.32) t = 2;
      o.type = t;

      const minSpace = lerp(245, 170, world.difficulty);
      const jitter = Math.random() * 70;
      const spawnX = Math.max(viewW + 40, world.spawnXCursor + minSpace + jitter);
      world.spawnXCursor = spawnX;

      o.phase = Math.random() * Math.PI * 2;
      o.x = spawnX;
      o.amp = 0;
      o.speedY = 0;
      o.gap = 96;

      if (t === 0) {
        o.w = 34; o.h = 34; o.y = world.groundY - o.h;
      } else if (t === 1) {
        o.w = 68; o.h = 34; o.y = world.groundY - o.h;
      } else if (t === 2) {
        o.w = 40; o.h = 40;
        o.y = world.groundY - o.h - 9;
        o.amp = 34;
        o.speedY = 2.4 + world.difficulty * 0.45;
      } else if (t === 3) {
        o.w = 34;
        o.h = 108;
        o.gap = 108;
        o.y = world.groundY - o.h - o.gap;
        world.upperCooldown = 1.15;
      } else {
        o.w = 62;
        o.h = 18;
        o.y = world.groundY - lerp(108, 124, world.difficulty);
        world.upperCooldown = 0.8;
      }
    }

    const P_MAX = 56;
    const particles = new Array(P_MAX);
    let particleCount = 0;
    for (let i = 0; i < P_MAX; i++) particles[i] = { active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, size: 0 };

    function emitWinParticles() {
      for (let i = 0; i < P_MAX; i++) {
        const p = particles[i];
        if (p.active) continue;
        p.active = true;
        particleCount++;
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 180;
        p.x = player.x + player.w * 0.5;
        p.y = player.y + player.h * 0.5;
        p.vx = Math.cos(a) * s;
        p.vy = Math.sin(a) * s - 40;
        p.life = 0.8 + Math.random() * 0.5;
        p.size = 2 + Math.random() * 3;
      }
    }

    function updateParticles(dt) {
      for (let i = 0; i < P_MAX; i++) {
        const p = particles[i];
        if (!p.active) continue;
        p.life -= dt;
        if (p.life <= 0) { p.active = false; particleCount--; continue; }
        p.vy += 300 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
      }
    }

    function overlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function obstacleHit(o, px, py, pw, ph) {
      if (o.type === 0) return overlap(px, py, pw, ph, o.x + 5, o.y + 8, o.w - 10, o.h - 8);
      if (o.type === 1) return overlap(px, py, pw, ph, o.x + 2, o.y + 8, o.w - 4, o.h - 8);
      if (o.type === 2 || o.type === 4) return overlap(px, py, pw, ph, o.x, o.y, o.w, o.h);
      const topH = o.h;
      const bottomY = o.y + o.h + o.gap;
      const bottomH = world.groundY - bottomY;
      return overlap(px, py, pw, ph, o.x, o.y, o.w, topH) || overlap(px, py, pw, ph, o.x, bottomY, o.w, bottomH);
    }

    function updatePlay(dt) {
      world.score = Math.min(5000, world.score + world.scoreRate * dt);
      world.difficulty = world.score / 5000;
      world.baseSpeed = lerp(270, 420, world.difficulty);
      world.speed = world.baseSpeed * world.speedScale;
      world.spawnInterval = lerp(1.42, 0.68, world.difficulty);
      world.bgT = world.difficulty;
      world.upperCooldown -= dt;

      if ((world.score | 0) > highScore) {
        highScore = world.score | 0;
        try { localStorage.setItem(STORAGE_KEY, String(highScore)); } catch (_) {}
      }
      updateScoreUI();

      if (world.score >= 5000 && !world.stopSpawn) {
        world.stopSpawn = true;
        emitWinParticles();
        state = STATE_WIN;
        stopMusic();
      }

      player.prevY = player.y;
      player.vy += player.gravity * dt;
      player.y += player.vy * dt;
      if (!player.onGround) player.rot += player.rotVel * dt;
      player.stretch = Math.max(0, player.stretch - dt * 6);
      player.squash = Math.max(0, player.squash - dt * 7);

      const groundTop = world.groundY - player.h;
      if (player.vy >= 0 && player.prevY <= groundTop && player.y >= groundTop) {
        const landingSpeed = player.vy;
        player.y = groundTop;
        player.vy = 0;
        player.rot = 0;
        player.onGround = true;
        player.squash = Math.max(player.squash, clamp(landingSpeed / 1200, 0, 1));
      }

      if (!world.stopSpawn) {
        world.spawnTimer += dt;
        while (world.spawnTimer >= world.spawnInterval) {
          world.spawnTimer -= world.spawnInterval;
          spawnObstacle();
        }
      }

      const hitX = player.x + 5;
      const hitY = player.y + 4;
      const hitW = player.w - 10;
      const hitH = player.h - 8;

      for (let i = 0; i < OB_MAX; i++) {
        const o = obstacles[i];
        if (!o.active) continue;
        o.x -= world.speed * dt;
        if (o.type === 2) {
          o.phase += o.speedY * dt;
          o.y = (world.groundY - o.h - 10) + Math.sin(o.phase) * o.amp;
        }
        if (o.x + o.w < -50) { freeObstacle(o); continue; }
        if (obstacleHit(o, hitX, hitY, hitW, hitH)) {
          returnToMenu();
          return;
        }
      }
    }

    function updateWin(dt) {
      world.winT += dt;
      world.speedScale = Math.max(0, world.speedScale - dt * 0.65);
      world.speed = world.baseSpeed * world.speedScale;
      world.winTextT = clamp(world.winTextT + dt * 0.8, 0, 1);
      world.bgT = clamp(world.bgT + dt * 0.6, 0, 1.1);

      player.bounceT += dt * 5.2;
      player.y = world.groundY - player.h - Math.abs(Math.sin(player.bounceT)) * 14;
      player.rot = 0;

      for (let i = 0; i < OB_MAX; i++) {
        const o = obstacles[i];
        if (!o.active) continue;
        o.x -= world.speed * dt;
        if (o.x + o.w < -40) freeObstacle(o);
      }

      updateParticles(dt);
      if (world.winT > 3.4) returnToMenu();
    }

    function updateMenu(dt, t) {
      world.bgT = 0.12 + Math.sin(t * 0.2) * 0.03;
      player.bounceT += dt * 2;
      updateScoreUI();
    }

    function setViewTransform() {
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, cssW, cssH);
      const ox = (cssW - BASE_W * scale) * 0.5;
      const oy = (cssH - BASE_H * scale) * 0.5;
      ctx.setTransform(scale * dpr, 0, 0, scale * dpr, ox * dpr, oy * dpr);
    }

    function drawBackground() {
      const t = clamp(world.bgT, 0, 1);
      const phase = performance.now() * 0.00015;
      const top = `hsl(${lerp(230, 278, t) + Math.sin(phase) * 8} 72% 11%)`;
      const bot = `hsl(${lerp(255, 310, t) + Math.cos(phase * 1.3) * 10} 80% 6%)`;
      const grad = ctx.createLinearGradient(0, 0, 0, world.groundY + 30);
      grad.addColorStop(0, top);
      grad.addColorStop(1, bot);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, viewW, world.groundY + 30);

      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      const skyOffset = (world.scroll * 0.08) % 80;
      for (let x = -skyOffset; x < viewW + 80; x += 80) ctx.fillRect(x, world.groundY - 120, 34, 2);

      ctx.fillStyle = '#000000';
      ctx.fillRect(0, world.groundY, viewW, viewH - world.groundY);

      const pulse = 0.52 + Math.sin(performance.now() * 0.005) * 0.12;
      ctx.fillStyle = `rgba(0,191,255,${pulse})`;
      ctx.fillRect(0, world.groundY, 2, viewH - world.groundY);
      ctx.fillRect(viewW - 2, world.groundY, 2, viewH - world.groundY);

      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      const groundOffset = (world.scroll * 0.55) % 46;
      for (let x = -groundOffset; x < viewW + 46; x += 46) ctx.fillRect(x, world.groundY + 12, 20, 2);
    }

    function drawCharacterShape(type, x, y, w, h, anim = 0) {
      const color = CHARACTERS[type].color;
      ctx.save();
      ctx.translate(x, y - anim);
      ctx.fillStyle = color;

      if (type === 0) {
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(w * 0.25, h * 0.3, w * 0.12, h * 0.12);
        ctx.fillRect(w * 0.63, h * 0.3, w * 0.12, h * 0.12);
        ctx.fillRect(w * 0.28, h * 0.62, w * 0.45, h * 0.08);
      } else if (type === 1) {
        ctx.beginPath(); ctx.arc(w * 0.5, h * 0.5, w * 0.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#0f172a';
        ctx.beginPath(); ctx.arc(w * 0.34, h * 0.42, w * 0.06, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(w * 0.66, h * 0.42, w * 0.06, 0, Math.PI * 2); ctx.fill();
      } else if (type === 2) {
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#111827';
        ctx.fillRect(w * 0.1, h * 0.12, w * 0.8, h * 0.2);
        ctx.fillStyle = '#e5e7eb';
        ctx.fillRect(w * 0.2, h * 0.42, w * 0.2, h * 0.2);
        ctx.fillRect(w * 0.6, h * 0.42, w * 0.2, h * 0.2);
      } else {
        ctx.fillRect(0, h * 0.15, w, h * 0.85);
        ctx.beginPath();
        ctx.moveTo(w * 0.15, h * 0.15); ctx.lineTo(w * 0.32, -1); ctx.lineTo(w * 0.46, h * 0.15);
        ctx.moveTo(w * 0.54, h * 0.15); ctx.lineTo(w * 0.68, -1); ctx.lineTo(w * 0.85, h * 0.15);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPlayer() {
      const sx = 1 + player.stretch * 0.08 - player.squash * 0.12;
      const sy = 1 - player.stretch * 0.12 + player.squash * 0.1;
      ctx.save();
      ctx.translate(player.x + player.w * 0.5, player.y + player.h * 0.5);
      ctx.rotate(player.rot);
      ctx.scale(sx, sy);
      drawCharacterShape(selectedChar, -player.w * 0.5, -player.h * 0.5, player.w, player.h);
      ctx.restore();
    }

    function drawObstacle(o) {
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = 'rgba(155,255,245,0.35)';
      ctx.lineWidth = 1;
      if (o.type === 0) {
        ctx.beginPath();
        ctx.moveTo(o.x, o.y + o.h);
        ctx.lineTo(o.x + o.w * 0.5, o.y);
        ctx.lineTo(o.x + o.w, o.y + o.h);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      } else if (o.type === 1) {
        const w = o.w * 0.48;
        for (let i = 0; i < 2; i++) {
          const x = o.x + i * (w + 3);
          ctx.beginPath();
          ctx.moveTo(x, o.y + o.h);
          ctx.lineTo(x + w * 0.5, o.y);
          ctx.lineTo(x + w, o.y + o.h);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }
      } else if (o.type === 2 || o.type === 4) {
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeRect(o.x + 0.5, o.y + 0.5, o.w - 1, o.h - 1);
      } else {
        ctx.fillRect(o.x, o.y, o.w, o.h);
        const by = o.y + o.h + o.gap;
        ctx.fillRect(o.x, by, o.w, world.groundY - by);
        ctx.strokeRect(o.x + 0.5, o.y + 0.5, o.w - 1, o.h - 1);
        ctx.strokeRect(o.x + 0.5, by + 0.5, o.w - 1, world.groundY - by - 1);
      }
    }

    function drawWinOverlay() {
      for (let i = 0; i < P_MAX; i++) {
        const p = particles[i];
        if (!p.active) continue;
        const a = clamp(p.life, 0, 1);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      }
      const t = world.winTextT;
      const alpha = clamp(t, 0, 1);
      const scl = lerp(0.7, 1.08, t);
      ctx.save();
      ctx.translate(viewW * 0.5, 145);
      ctx.scale(scl, scl);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.font = '700 68px system-ui, sans-serif';
      ctx.fillText('YOU WIN', 0, 0);
      ctx.restore();
    }

    function renderCardContent(card, i) {
      const av = document.createElement('div');
      av.className = `avatar${CHARACTERS[i].shape === 'round' ? ' round' : ''}`;
      av.style.background = CHARACTERS[i].color;
      const label = document.createElement('span');
      label.textContent = CHARACTERS[i].name;
      card.append(av, label);
    }

    function syncSelectedCard() {
      for (let i = 0; i < cardsEl.children.length; i++) {
        cardsEl.children[i].classList.toggle('selected', i === selectedChar);
      }
    }

    function buildMenuCards() {
      const frag = document.createDocumentFragment();
      for (let i = 0; i < CHARACTERS.length; i++) {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'card';
        card.dataset.charId = String(i);
        renderCardContent(card, i);
        frag.appendChild(card);
      }
      cardsEl.appendChild(frag);
      syncSelectedCard();
    }

    cardsEl.addEventListener('click', (e) => {
      const el = e.target.closest('.card');
      if (!el) return;
      selectedChar = Number(el.dataset.charId) || 0;
      syncSelectedCard();
      startGame();
    }, { passive: true });

    buildMenuCards();

    let prev = performance.now();
    function frame(now) {
      requestAnimationFrame(frame);
      const dtRaw = (now - prev) * 0.001;
      prev = now;
      const dt = Math.min(dtRaw, 0.033);

      world.scroll += world.speed * dt;

      if (state === STATE_PLAY) updatePlay(dt);
      else if (state === STATE_WIN) updateWin(dt);
      else updateMenu(dt, now);
      updateAudio(dt);

      setViewTransform();
      drawBackground();

      if (state !== STATE_MENU) {
        for (let i = 0; i < OB_MAX; i++) {
          const o = obstacles[i];
          if (o.active) drawObstacle(o);
        }
        drawPlayer();
        if (state === STATE_WIN) drawWinOverlay();
      }
    }

    resetWorld();
    setMenuVisible(true);
    updateScoreUI(true);
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
